  intl: 0.19.0

  # 🎨 UI
  google_fonts: 6.2.1
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
    # 🔧 CODE GENERATION (Hive)
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  change_app_package_name: ^1.1.0
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
