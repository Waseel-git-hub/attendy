name: attendance_tracker
description: Attendance Tracker

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.2

  # STORAGE
  hive: 2.2.3
  hive_flutter: 1.1.0
  uuid: 4.4.0

   # 🔁 STATE MANAGEMENT (SIMPLE + SCALABLE)
